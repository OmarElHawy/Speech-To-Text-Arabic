# Logging Configuration (T026)
# This file configures the structure and output of all logs

logging:
  # Root logger level
  level: INFO
  
  # Log output directory
  log_dir: logs
  
  # Whether to use JSON format for file logs
  use_json: false
  
  # Console output settings
  console:
    enabled: true
    level: INFO
    format: "[%(asctime)s] [%(levelname)8s] [%(name)s] %(message)s"
    date_format: "%Y-%m-%d %H:%M:%S"
  
  # File output settings
  file:
    enabled: true
    level: DEBUG
    filename: "speech_to_text.log"
    max_bytes: 10485760  # 10 MB
    backup_count: 5
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    date_format: "%Y-%m-%d %H:%M:%S"
  
  # Module-specific levels
  modules:
    "src.models": DEBUG
    "src.services": DEBUG
    "src.cli": INFO
    "src.utils": DEBUG
    "pytorch_lightning": INFO
    "transformers": INFO
    "librosa": WARNING

# Inference logging
inference:
  log_queries: true
  log_results: true
  log_confidence: true
  log_processing_time: true

# Training logging
training:
  log_loss: true
  log_metrics: true
  log_learning_rate: true
  log_batch_info: true
  log_epoch_summary: true
  
  # Tensorboard logs directory
  tensorboard_dir: "runs/

  # Checkpoint save frequency (in epochs)
  checkpoint_frequency: 1

# Evaluation logging
evaluation:
  log_detailed_metrics: true
  log_per_sample_results: false  # Can be verbose
  log_confusion_matrix: true
  log_error_analysis: true

# Performance profiling
profiling:
  enabled: false
  log_memory_usage: false
  log_compute_time: false
